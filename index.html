<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <title>Silly Stone</title>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: target.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="myModel" src="silly_stone.glb"></a-asset-item>
      <img id="groundTexture" src="Grass001_1K-JPG_Color.jpg">
      <audio id="stoneSound" src="stone.mp3"></audio>
    </a-assets>

    <a-entity 
      id="mymodel"
      gltf-model="#myModel"
      position="0 1 -3"
      rotation="0 0 0"
      scale="0.3 0.3 0.3">
    </a-entity>

    <a-plane
      src="#groundTexture"
      rotation="-90 0 0"
      width="30"
      height="30">
    </a-plane>

    <a-sky color="#87B6BC"></a-sky>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  </a-scene>

  <script>
    const model = document.querySelector('#mymodel');
    const sound = document.querySelector('#stoneSound');

    model.addEventListener('click', () => {
      sound.play();
    });
  </script>

</body>
</html>
